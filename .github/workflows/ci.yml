name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -count=1
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  # The dashboard is a Vite build whose OUTPUT is committed (go:embed ships
  # it; the release workflow only runs `go build`). Rebuild and diff so a UI
  # source change can't land with a stale committed bundle. Works because
  # Vite's filenames are content-hashed and npm ci pins deps via the lockfile,
  # so rebuilding unchanged source is byte-identical.
  dashboard-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: internal/dashboard/ui/package-lock.json
      - run: npm ci --prefix internal/dashboard/ui
      - run: npm test --prefix internal/dashboard/ui
      - run: npm run build --prefix internal/dashboard/ui
      - run: git diff --exit-code -- internal/dashboard/assets
