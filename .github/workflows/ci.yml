name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # Some CLI tests exercise the real store path, and the store's
      # integration tests below deliberately fail loud if the CLI is absent.
      # Install DuckDB before any Go test step so unit and integration tests
      # see the same runtime dependency.
      - name: Install DuckDB CLI
        run: |
          curl -fsSL https://install.duckdb.org | sh
          echo "$HOME/.duckdb/cli/latest" >> "$GITHUB_PATH"
      - run: duckdb --version
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -count=1
      # The store's DuckDB round-trips (hold-upsert CASE, Promote, queue
      # ordering) only run under the integration tag and self-skip without
      # the duckdb CLI; the version check above keeps that dependency loud
      # so the queue's most intricate SQL is actually exercised in CI. Only
      # the store package runs here: review/discover
      # integration tests need codex/gh auth, which CI doesn't have.
      - run: go test ./internal/store/ -count=1 -tags=integration
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  # The dashboard is a Vite build whose OUTPUT is committed (go:embed ships
  # it; the release workflow only runs `go build`). Rebuild and diff so a UI
  # source change can't land with a stale committed bundle. Works because
  # Vite's filenames are content-hashed and npm ci pins deps via the lockfile,
  # so rebuilding unchanged source is byte-identical.
  dashboard-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: internal/dashboard/ui/package-lock.json
      - run: npm ci --prefix internal/dashboard/ui
      - run: npm test --prefix internal/dashboard/ui
      - run: npm run build --prefix internal/dashboard/ui
      - run: git diff --exit-code -- internal/dashboard/assets
