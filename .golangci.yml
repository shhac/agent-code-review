version: "2"

linters:
  default: standard
  settings:
    staticcheck:
      checks:
        - all
        # Error strings here are user-facing LLM messages; capitalization is
        # part of the output contract.
        - -ST1005
  exclusions:
    rules:
      # Test files do lots of _ = thing.Close() / _ = Write(...) on purpose.
      - linters:
          - errcheck
        path: _test\.go
