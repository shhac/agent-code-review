<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>agent-code-review</title>
    <style>
      :root { color-scheme: light dark; --fg: #1a1a1a; --muted: #6b7280; --line: #e5e7eb; --bg: #ffffff; }
      @media (prefers-color-scheme: dark) {
        :root { --fg: #e5e7eb; --muted: #9ca3af; --line: #2a2f3a; --bg: #0f1115; }
      }
      * { box-sizing: border-box; }
      body { margin: 0; font: 15px/1.5 -apple-system, system-ui, sans-serif; color: var(--fg); background: var(--bg); }
      header { padding: 20px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 12px; }
      h1 { font-size: 18px; margin: 0; }
      .muted { color: var(--muted); font-size: 13px; }
      main { padding: 24px; overflow-x: auto; }
      table { border-collapse: collapse; width: 100%; min-width: 720px; }
      th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--line); white-space: nowrap; }
      th { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
      td.title { white-space: normal; }
      .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 12px; border: 1px solid var(--line); }
      .empty { color: var(--muted); padding: 40px 0; text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <h1>agent-code-review</h1>
      <span class="muted" id="summary">loading…</span>
    </header>
    <main>
      <table id="queue" hidden>
        <thead>
          <tr><th>#</th><th>Repo</th><th>Title</th><th>Type</th><th>Author</th><th>Status</th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="empty" id="empty" hidden>Queue is empty.</div>
    </main>
    <script>
      async function refresh() {
        try {
          const res = await fetch('/api/queue');
          const data = await res.json();
          const rows = (data.candidates || []);
          const tbody = document.querySelector('#queue tbody');
          tbody.innerHTML = '';
          for (const c of rows) {
            const tr = document.createElement('tr');
            tr.innerHTML =
              `<td><a href="${c.url || '#'}">#${c.number}</a></td>` +
              `<td>${c.repo || ''}</td>` +
              `<td class="title">${c.title || ''}</td>` +
              `<td><span class="pill">${c.type || ''}</span></td>` +
              `<td>${c.author || ''}</td>` +
              `<td><span class="pill">${c.status || ''}</span></td>`;
            tbody.appendChild(tr);
          }
          document.querySelector('#queue').hidden = rows.length === 0;
          document.querySelector('#empty').hidden = rows.length !== 0;
          document.querySelector('#summary').textContent =
            `${rows.length} in queue · updated ${new Date().toLocaleTimeString()}`;
        } catch (e) {
          document.querySelector('#summary').textContent = 'error loading queue';
        }
      }
      refresh();
      setInterval(refresh, 15000);
    </script>
  </body>
</html>
