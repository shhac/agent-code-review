<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>agent-code-review</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <div class="header-row">
        <h1>agent-code-review</h1>
        <nav>
          <a href="/" class="active">Overview</a>
          <a href="/config.html">Config</a>
          <a href="/prompt.html">Prompt</a>
        </nav>
      </div>
      <span class="muted header-status" id="summary">loading…</span>
    </header>
    <main>
      <h2>Queue</h2>
      <form class="inline" id="add-form">
        <input id="add-input" placeholder="https://github.com/owner/repo/pull/123 — or owner/repo/pull/123" required size="48" />
        <button type="submit">Add to queue</button>
        <span class="err" id="add-err"></span>
      </form>
      <div class="scroll">
        <table id="queue" hidden>
          <thead><tr><th></th><th>#</th><th>Repo</th><th>Title</th><th>Type</th><th>Author</th><th>Status</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="empty" id="queue-empty" hidden>Queue is empty.</div>

      <h2>Recent reviews</h2>
      <div class="scroll">
        <table id="reviews" hidden>
          <thead><tr><th>#</th><th>Repo</th><th>Result</th><th>Engine</th><th>SHA</th><th>When</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="empty" id="reviews-empty" hidden>No reviews yet.</div>

      <h2>Recent runs</h2>
      <div class="scroll">
        <table id="runs" hidden>
          <thead><tr><th>Started</th><th>Finished</th><th>Status</th><th>Host</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="empty" id="runs-empty" hidden>No runs yet.</div>
    </main>
    <script>
      const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
      const when = (t) => t ? new Date(t).toLocaleString() : '';

      function fill(tableId, rows, render) {
        const table = document.getElementById(tableId);
        const empty = document.getElementById(tableId + '-empty');
        table.querySelector('tbody').innerHTML = rows.map(render).join('');
        table.hidden = rows.length === 0;
        empty.hidden = rows.length !== 0;
      }

      async function post(url, body) {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error((await res.json()).error || res.statusText);
      }

      async function refresh() {
        try {
          const [q, rv, rn] = await Promise.all([
            fetch('/api/queue').then(r => r.json()),
            fetch('/api/reviews').then(r => r.json()),
            fetch('/api/runs').then(r => r.json()),
          ]);
          const queue = q.candidates || [];
          fill('queue', queue, c => {
            const arrows = c.status === 'queued'
              ? `<button class="ghost move" data-repo="${esc(c.repo)}" data-number="${esc(c.number)}" data-dir="up">↑</button>` +
                `<button class="ghost move" data-repo="${esc(c.repo)}" data-number="${esc(c.number)}" data-dir="down">↓</button>`
              : '';
            return `<tr><td>${arrows}</td>` +
              `<td><a href="${esc(c.url) || '#'}">#${esc(c.number)}</a></td>` +
              `<td>${esc(c.repo)}</td><td class="title">${esc(c.title)}</td>` +
              `<td><span class="pill">${esc(c.type)}</span></td><td>${esc(c.author)}</td>` +
              `<td><span class="pill">${esc(c.status)}</span></td></tr>`;
          });
          fill('reviews', rv.reviews || [], r =>
            `<tr><td>#${esc(r.number)}</td><td>${esc(r.repo)}</td>` +
            `<td><span class="pill">${esc(r.verdict)}</span></td><td>${esc(r.engine)}</td>` +
            `<td>${esc((r.head_sha || '').slice(0, 8))}</td><td>${when(r.reviewed_at)}</td></tr>`);
          fill('runs', rn.runs || [], r =>
            `<tr><td>${when(r.started_at)}</td><td>${when(r.finished_at)}</td>` +
            `<td><span class="pill">${esc(r.status)}</span></td><td>${esc(r.host)}</td></tr>`);
          document.getElementById('summary').textContent =
            `${queue.length} in queue · updated ${new Date().toLocaleTimeString()}`;
        } catch (e) {
          document.getElementById('summary').textContent = 'error loading data';
        }
      }

      document.getElementById('add-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const err = document.getElementById('add-err');
        err.textContent = '';
        try {
          await post('/api/queue', { url: document.getElementById('add-input').value.trim() });
          document.getElementById('add-input').value = '';
          refresh();
        } catch (ex) { err.textContent = ex.message; }
      });

      document.querySelector('#queue tbody').addEventListener('click', async (e) => {
        const btn = e.target.closest('button.move');
        if (!btn) return;
        try {
          await post('/api/queue/move', {
            repo: btn.dataset.repo,
            number: parseInt(btn.dataset.number, 10),
            direction: btn.dataset.dir,
          });
          refresh();
        } catch (ex) { document.getElementById('add-err').textContent = ex.message; }
      });

      refresh();
      setInterval(refresh, 15000);
    </script>
  </body>
</html>
